name: Shellcheck

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure shellcheck installed
        run: command -v shellcheck || sudo apt-get install -y shellcheck
      - name: Run lint.sh
        run: ./lint.sh
