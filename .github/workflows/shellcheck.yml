name: Lint shell scripts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v2
      - name: Ensure shellcheck installed
        run: command -v shellcheck || sudo apt-get install -y shellcheck
      - run: just lint-shell
