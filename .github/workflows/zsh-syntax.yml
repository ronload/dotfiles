name: Check Zsh syntax

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  zsh-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v4
      - name: Ensure zsh installed
        run: command -v zsh || sudo apt-get install -y zsh
      - run: just lint-zsh
