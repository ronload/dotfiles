name: Check shell script formatting

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - name: Install shfmt
        run: |
          sudo curl -sSfL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/latest/download/shfmt_v3.13.1_linux_amd64
          sudo chmod +x /usr/local/bin/shfmt
      - run: just format-shell
