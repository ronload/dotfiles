name: Shfmt

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          curl -sSfL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/latest/download/shfmt_v3.13.1_linux_amd64
          chmod +x /usr/local/bin/shfmt
      - name: shfmt diff check
        run: shfmt -i 2 -ci -d $(git ls-files '*.sh')
