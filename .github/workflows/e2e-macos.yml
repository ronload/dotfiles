name: E2E install (macOS)

# Full end-to-end reproduction test: run setup.sh on a macOS runner the way a
# new machine would, then confirm every package and symlink landed.
#
# Caveats (an honest "fresh macOS" cannot be done on hosted runners):
#   - GitHub runners ship Homebrew, git, go and rust pre-installed, so this is
#     not a truly pristine system. A real fresh-install guarantee needs a macOS
#     VM (tart/UTM) on a self-hosted runner.
#   - GUI casks (docker-desktop, karabiner, chrome, fonts, mcbopomofo, ngrok)
#     need GUI/admin and cannot be verified headless, so they are skipped via
#     HOMEBREW_BUNDLE_CASK_SKIP. brew bundle check honours the same variable.
#
# Triggered on a schedule, manually, and only on PRs that touch the install
# path -- not on every PR, since it installs the whole Brewfile (slow + costly).

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - Brewfile
      - setup.sh
      - install.sh
      - .github/workflows/e2e-macos.yml

permissions:
  contents: read

concurrency:
  group: e2e-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - name: Validate Brewfile parses
        run: brew bundle list --file=Brewfile >/dev/null

      - name: Skip GUI casks (cannot verify headless)
        run: |
          casks="$(brew bundle list --file=Brewfile --cask | tr '\n' ' ')"
          echo "Skipping casks: ${casks}"
          echo "HOMEBREW_BUNDLE_CASK_SKIP=${casks}" >>"${GITHUB_ENV}"

      - name: Run setup.sh (installs everything, links configs)
        run: ./setup.sh

      - name: Verify all declared symlinks were created
        run: just test-install
