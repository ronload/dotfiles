name: Check Lua formatting

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  stylua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v4
      - name: Install stylua
        run: |
          curl -sSfL -o /tmp/stylua.zip \
            https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip
          unzip -o /tmp/stylua.zip -d /tmp
          sudo mv /tmp/stylua /usr/local/bin/stylua
          sudo chmod +x /usr/local/bin/stylua
      - run: just format-lua
