add_newline = false

format = """\
$directory\
$git_branch\
$git_state\
${custom.git_status}
$character"""

[directory]
truncation_length = 1
truncate_to_repo = false
truncation_symbol = ""
style = "bold purple"
format = "[ $path]($style)"
read_only = ""

[git_branch]
symbol = ""
style = "bold blue"
format = " on [$branch]($style)"

[git_state]
style = "bold red"
format = ' \([$state( $progress_current/$progress_total)]($style)\)'

[custom.git_status]
description = "Compact git status: [mod stg unt a2 ...] with no padding inside brackets"
command = "$HOME/dotfiles/starship/git-status.sh"
when = "git rev-parse --is-inside-work-tree"
shell = ["bash", "--noprofile", "--norc"]
format = ' (\[[$output]($style)\])'
style = "bold yellow"

[character]
success_symbol = "[󰘧](bold green)"
error_symbol = "[󰘧](bold red)"
