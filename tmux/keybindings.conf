# setup Ctrl + s as sending tmux prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix
# command-prompt: the COMMAND + session block is now provided globally by
# message-format (statusline.conf), so keep this plain to avoid a doubled block.
bind \; command-prompt

# setup Ctrl + l as clear tmux history
bind -n C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

# mouse wheel: tmux-level scrolling is DISABLED -- move the tmux scrollback with the
# keyboard only (prefix + [ then vi keys / C-u / C-d / PageUp/PageDown).
# Only a real fullscreen TUI (alternate screen) still gets raw mouse passthrough, so
# its OWN mouse scroll keeps working (nvim, less, htop). tmux's default also passes
# through on #{mouse_any_flag}, which is what breaks: a TUI that dies without
# resetting its mouse modes (SGR 1006 + motion 1002/1003) leaves the flag stuck on,
# so every later wheel/move is forwarded into the bare shell and zsh inserts the raw
# reports as text (65;144;26M ...). Keying only on #{alternate_on} means a bare
# prompt can never receive passthrough, stuck flag or not. With no false branch the
# wheel simply does nothing at a bare prompt instead of entering copy-mode.
bind -n WheelUpPane   if -F '#{alternate_on}' 'send -M'
bind -n WheelDownPane if -F '#{alternate_on}' 'send -M'
# Kill the wheel inside copy-mode too, so the scrollback moves by keyboard only.
# tmux-smooth-scroll skips wheel keys because @smooth-scroll-mouse is "false", so
# these unbinds survive tpm init (plugins.conf is sourced after this file).
unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane
# Drop the status-line wheel too (tmux default: wheel over the status bar switches
# windows). Keep the mouse out of navigation entirely -- switch windows with C-1..9.
unbind -n WheelUpStatus
unbind -n WheelDownStatus

# panel navigation
# (extended-keys / csi-u must be enabled for the C-S-* and C-1..9 keys below)
set -s extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
bind -n 'C-S-\' split-window -h -c "#{pane_current_path}"
bind -n 'C-|'   split-window -h -c "#{pane_current_path}"
bind -n 'C-S--' split-window -v -c "#{pane_current_path}"
bind -n 'C-_'   split-window -v -c "#{pane_current_path}"
bind -n 'C-S-h' select-pane -L
bind -n 'C-S-j' select-pane -D
bind -n 'C-S-k' select-pane -U
bind -n 'C-S-l' select-pane -R
bind x kill-pane

# window navigation (C-1..C-9 -> window 1..9; bridged from ghostty as csi-u)
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9
