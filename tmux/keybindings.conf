# setup Ctrl + s as sending tmux prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix
bind \; command-prompt

# setup Ctrl + l as clear tmux history
bind -n C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

# panel navigation
# (extended-keys / csi-u must be enabled for the C-S-* and C-1..9 keys below)
set -s extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
bind -n 'C-S-\' split-window -h -c "#{pane_current_path}"
bind -n 'C-|'   split-window -h -c "#{pane_current_path}"
bind -n 'C-S--' split-window -v -c "#{pane_current_path}"
bind -n 'C-_'   split-window -v -c "#{pane_current_path}"
bind -n 'C-S-h' select-pane -L
bind -n 'C-S-j' select-pane -D
bind -n 'C-S-k' select-pane -U
bind -n 'C-S-l' select-pane -R
bind x kill-pane

# window navigation (C-1..C-9 -> window 1..9; bridged from ghostty as csi-u)
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9
