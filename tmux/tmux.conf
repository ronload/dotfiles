# tmux configuration entry point.
# This file only controls LOAD ORDER -- the actual settings live in the sourced
# files below. plugins.conf MUST be sourced last: it ends with tpm init, which
# has to run after every plugin option has been set.
source-file ~/dotfiles/tmux/appearance.conf
source-file ~/dotfiles/tmux/statusline.conf
source-file ~/dotfiles/tmux/options.conf
source-file ~/dotfiles/tmux/keybindings.conf
source-file ~/dotfiles/tmux/plugins.conf
