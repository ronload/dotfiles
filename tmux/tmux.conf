# setup color scheme
source-file -q ~/.local/share/nvim/lazy/tokyonight.nvim/extras/tmux/tokyonight_moon.tmux

# dim pane borders (override theme's active border highlight)
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#3b4261"

# setup emacs mode
set -g status-keys emacs

# setup Ctrl + s as sending tmux prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix
bind \; command-prompt

# enable kitty graphics pass through
set -gq allow-passthrough on
set -g visual-activity off

# forward focus events to apps (nvim autoread on pane switch)
set -g focus-events on

# general
set -sg escape-time 0
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# truecolor
set -g default-terminal "tmux-256color"
set -as terminal-features 'xterm-ghostty:RGB'

# copy mode (emacs, matches zsh bindkey -e) + macOS clipboard
set -g mode-keys emacs
set -g set-clipboard on
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode M-w send -X copy-pipe-and-cancel "pbcopy"

# panel navigation
set -s extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
bind -n 'C-S-\' split-window -h -c "#{pane_current_path}"
bind -n 'C-|'   split-window -h -c "#{pane_current_path}"
bind -n 'C-S--' split-window -v -c "#{pane_current_path}"
bind -n 'C-_'   split-window -v -c "#{pane_current_path}"
bind -n 'C-S-h' select-pane -L
bind -n 'C-S-j' select-pane -D
bind -n 'C-S-k' select-pane -U
bind -n 'C-S-l' select-pane -R
bind x kill-pane

# plugins (tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'

# session persistence
set -g @resurrect-save 'S'                      # remap off C-s (prefix) to keep send-prefix
set -g @resurrect-restore 'R'
set -g @resurrect-strategy-nvim 'session'       # restore nvim sessions
set -g @resurrect-capture-pane-contents 'on'    # restore pane scrollback
set -g @continuum-restore 'on'                  # auto-restore on tmux server start

# session switcher (sessionx)
set -g @sessionx-bind 's'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
# unify look with the other fzf pickers (Telescope-style)
set -g @sessionx-fzf-builtin-tmux 'on'        # let fzf draw the popup itself
set -g @sessionx-window-width '80%'
set -g @sessionx-window-height '90%'
# sessionx runs fzf via `tmux run-shell`, which only sees the tmux server's
# (often stale) inherited FZF_DEFAULT_OPTS -- so the colorscheme must be passed
# explicitly here. These flags mirror zsh/zshrc's _fzf_telescope_style (tokyonight-moon)
# and override FZF_DEFAULT_OPTS because additional-options land on fzf's command line.
set -g @sessionx-additional-options '--ansi --info=inline-right --highlight-line --layout=default --border=none --list-border=rounded --input-border=rounded --preview-border=rounded --gutter=" " --color=fg:#c8d3f5,bg:#1e2030,hl:#86e1fc --color=fg+:#c8d3f5,bg+:#2f334d,hl+:#86e1fc --color=border:#636da6,list-border:#636da6,input-border:#636da6,preview-border:#636da6 --color=gutter:#1e2030,info:#636da6,separator:#636da6,scrollbar:#636da6 --color=prompt:#82aaff,pointer:#c099ff,marker:#c099ff,spinner:#c099ff,query:#c8d3f5,header:#636da6 --color=list-label:#c099ff,input-label:#82aaff,preview-label:#c3e88d'
set -g @sessionx-pointer '>'
set -g @sessionx-prompt '> '

# initialize tpm (keep this line at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'

