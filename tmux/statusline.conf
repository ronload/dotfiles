# tmux statusline.
#
# Sourced AFTER appearance.conf (which loads the tokyonight theme) so these
# status-left / status-right definitions override the theme's defaults.
#
# nvim integration (vim-tpipeline): the active nvim pane drives the bar by
# writing its lualine into a bridge file that we `cat` in at the end. The mode
# and session blocks below are shown ONLY when the active pane is NOT nvim; when
# nvim is focused the outer conditional collapses to empty and the cat-ed
# vimbridge takes over. Keeping the #() warm from server start lets the first
# nvim launch integrate immediately (pairs with g:tpipeline_autoembed = 0).
#
# NOTE ON #{E:...}: a user option referenced as #{@x} is substituted but NOT
# re-evaluated, so an option holding a format must be read as #{E:#{@x}} to force
# the inner conditional to run. Continuation lines below are kept flush-left on
# purpose: leading whitespace on a continued line would leak into the value.

# ── mode colour ──────────────────────────────────────────────────────────────
# Follows tmux's current state, mirroring the nvim lualine mode hues.
#   COMMAND  client_prefix          yellow   #ffc777
#   VISUAL   selection (charwise)   magenta  #c099ff
#   V-BLOCK  selection + rectangle  magenta  #c099ff  (tmux has no linewise flag, so no V-LINE)
#   COPY     copy-mode              green    #c3e88d
#   VIEW     view-mode              teal     #4fd6be
#   SYNC     synchronize-panes      red      #ff757f  (zoom already shows as #F in the window list)
#   INSERT   default                blue     #82aaff
set -g @sl_mode_color '\
#{?client_prefix,#ffc777,\
#{?pane_in_mode,\
#{?selection_present,#c099ff,#{?#{==:#{pane_mode},view-mode},#4fd6be,#c3e88d}},\
#{?pane_synchronized,#ff757f,#82aaff}}}'

# ── mode label ───────────────────────────────────────────────────────────────
# Parallel to @sl_mode_color: same branches, resolving to the label text.
set -g @sl_mode_label '\
#{?client_prefix,COMMAND,\
#{?pane_in_mode,\
#{?selection_present,#{?rectangle_toggle,V-BLOCK,VISUAL},#{?#{==:#{pane_mode},view-mode},VIEW,COPY}},\
#{?pane_synchronized,SYNC,INSERT}}}'

# ── status-left ──────────────────────────────────────────────────────────────
# Skeleton (top to bottom):
#   1. if the active pane is nvim -> render nothing (vimbridge drives the bar)
#   2. otherwise:
#      a. mode block    -- square style, matches nvim lualine: mode colour bg,
#                          dark fg (#1b1d2b), the mode label.
#      b. session block -- lualine_b/branch style: fg follows the mode colour,
#                          bg is fg_gutter (#3b4261), shows the session name.
#   3. always append the nvim vimbridge (lualine) output.
set -g status-left '\
#{?#{m:*nvim*,#{pane_current_command}},,\
#[fg=#1b1d2b bg=#{E:#{@sl_mode_color}} bold]  #{E:#{@sl_mode_label}} #[default]\
#[fg=#{E:#{@sl_mode_color}} bg=#3b4261] #{session_name} #[default]\
}\
#(cat #{socket_path}-\#{session_id}-vimbridge)'

# ── status-right ─────────────────────────────────────────────────────────────
# The right-hand half of the nvim vimbridge (lualine) output.
set -g status-right '#(cat #{socket_path}-\#{session_id}-vimbridge-R)'
