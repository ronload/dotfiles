# setup color scheme
source-file -q ~/dotfiles/themes/tokyonight-moon/tmux/tokyonight_moon.tmux

# dim pane borders (override theme's active border highlight)
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#3b4261"

# command-prompt input / messages: use the statusline bg so typed commands have
# no distinct background block (theme sets these to #3b4261). the prompt input is
# always drawn with message-style, so this is the only way to drop its background;
# it also applies to display-message notices.
set -g message-style "fg=#82aaff,bg=#1e2030"
set -g message-command-style "fg=#82aaff,bg=#1e2030"

# truecolor
set -g default-terminal "tmux-256color"
set -as terminal-features 'xterm-ghostty:RGB'
set -g prompt-cursor-colour 'default'

# statusline (status-left / status-right) lives in statusline.conf, sourced next.
