# setup color scheme
source-file -q ~/dotfiles/themes/tokyonight-moon/tmux/tokyonight_moon.tmux

# dim pane borders (override theme's active border highlight)
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#3b4261"

# truecolor
set -g default-terminal "tmux-256color"
set -as terminal-features 'xterm-ghostty:RGB'
set -g prompt-cursor-colour 'default'

# embed nvim (vim-tpipeline) statusline -- keep the #() warm from server start so
# the first nvim launch integrates immediately (pairs with g:tpipeline_autoembed = 0)
# mode block (square style, matches nvim lualine) shown only when the active pane
# is not nvim; when nvim is focused the cat-ed vimbridge (lualine) drives the bar.
#   COMMAND  client_prefix        yellow  #ffc777
#   VISUAL   selection (charwise) magenta #c099ff
#   V-BLOCK  selection + rectangle magenta #c099ff (tmux has no linewise flag, so no V-LINE)
#   COPY     copy-mode            green   #c3e88d
#   VIEW     view-mode            teal    #4fd6be
#   SYNC     synchronize-panes    red     #ff757f (zoom is already shown as #F in the window list)
#   INSERT   default              blue    #82aaff
# TMUX block (lualine_b/branch style): bg fg_gutter #3b4261, fg follows the mode colour, branch icon.
set -g status-left  '#{?#{m:*nvim*,#{pane_current_command}},,#[fg=#1b1d2b bg=#{?client_prefix,#ffc777,#{?pane_in_mode,#{?selection_present,#c099ff,#{?#{==:#{pane_mode},view-mode},#4fd6be,#c3e88d}},#{?pane_synchronized,#ff757f,#82aaff}}} bold]  #{?client_prefix,COMMAND,#{?pane_in_mode,#{?selection_present,#{?rectangle_toggle,V-BLOCK,VISUAL},#{?#{==:#{pane_mode},view-mode},VIEW,COPY}},#{?pane_synchronized,SYNC,INSERT}}} #[default]#[fg=#{?client_prefix,#ffc777,#{?pane_in_mode,#{?selection_present,#c099ff,#{?#{==:#{pane_mode},view-mode},#4fd6be,#c3e88d}},#{?pane_synchronized,#ff757f,#82aaff}}} bg=#3b4261] TMUX #[default]}#(cat #{socket_path}-\#{session_id}-vimbridge)'
set -g status-right '#(cat #{socket_path}-\#{session_id}-vimbridge-R)'
